name: Feature Request
description: Suggest an improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. Please focus on problem and impact.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe your preferred solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - API
        - Desktop
        - RAG / Obsidian
        - Installer / Packaging
        - Docs
        - CI / DX
    validations:
      required: true
