name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terminal-jarvis/package-lock.json
      - name: Install dependencies
        working-directory: terminal-jarvis
        run: npm ci
      - name: Check environment
        working-directory: terminal-jarvis
        run: npm run check-env

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terminal-jarvis/package-lock.json
      - name: Install dependencies
        working-directory: terminal-jarvis
        run: npm ci
      - name: Lint
        working-directory: terminal-jarvis
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terminal-jarvis/package-lock.json
      - name: Install dependencies
        working-directory: terminal-jarvis
        run: npm ci
      - name: Typecheck
        working-directory: terminal-jarvis
        run: npm run typecheck

  unit-test:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terminal-jarvis/package-lock.json
      - name: Install dependencies
        working-directory: terminal-jarvis
        run: npm ci
      - name: Run tests
        working-directory: terminal-jarvis
        run: npm run test

  smoke:
    runs-on: ubuntu-latest
    needs: [setup, lint, typecheck, unit-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terminal-jarvis/package-lock.json
      - name: Install dependencies
        working-directory: terminal-jarvis
        run: npm ci
      - name: Build
        working-directory: terminal-jarvis
        run: npm run build
      - name: CLI smoke
        working-directory: terminal-jarvis
        run: npm run smoke:cli
      - name: API smoke
        working-directory: terminal-jarvis
        run: npm run smoke:api
      - name: Install Linux desktop smoke deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Desktop smoke
        working-directory: terminal-jarvis
        run: xvfb-run -a npm run smoke:desktop

  windows-validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: terminal-jarvis/package-lock.json
      - name: Install dependencies
        working-directory: terminal-jarvis
        run: npm ci
      - name: Build
        working-directory: terminal-jarvis
        run: npm run build
      - name: Lint
        working-directory: terminal-jarvis
        run: npm run lint
      - name: Typecheck
        working-directory: terminal-jarvis
        run: npm run typecheck
      - name: Unit tests
        working-directory: terminal-jarvis
        run: npm run test
      - name: CLI smoke
        working-directory: terminal-jarvis
        run: npm run smoke:cli
      - name: API smoke
        working-directory: terminal-jarvis
        run: npm run smoke:api
      - name: Desktop smoke
        working-directory: terminal-jarvis
        run: npm run smoke:desktop
